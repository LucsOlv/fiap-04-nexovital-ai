# Configuração compartilhada de ferramentas Python (Ruff + MyPy + Pytest).
# Aplicável ao backend/. A raiz não contém código Python executável.

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["frontend", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["frontend", "build", "dist"]

[tool.pytest.ini_options]
addopts = "-q"
