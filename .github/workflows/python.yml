name: Python

on:
  push:
    paths: ["backend/**", "pyproject.toml", ".github/workflows/python.yml"]
  pull_request:
    paths: ["backend/**", "pyproject.toml", ".github/workflows/python.yml"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest
