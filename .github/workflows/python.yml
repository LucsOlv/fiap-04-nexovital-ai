name: Python

on:
  push:
    paths:
      ["backend/**", "worker/**", "packages/**", ".github/workflows/python.yml"]
  pull_request:
    paths:
      ["backend/**", "worker/**", "packages/**", ".github/workflows/python.yml"]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, worker]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy ${{ matrix.service == 'backend' && 'app' || 'worker' }}
      - run: uv run pytest
