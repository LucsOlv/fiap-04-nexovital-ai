name: Containers

on:
  push:
    paths:
      [
        "backend/**",
        "worker/**",
        "frontend/**",
        "packages/**",
        ".github/workflows/containers.yml",
      ]
  pull_request:
    paths:
      [
        "backend/**",
        "worker/**",
        "frontend/**",
        "packages/**",
        ".github/workflows/containers.yml",
      ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, worker, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build a partir da raiz do repo; nenhum push é realizado (push: false).
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
