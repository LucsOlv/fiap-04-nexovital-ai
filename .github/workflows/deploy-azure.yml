name: Deploy Azure

on:
  workflow_dispatch:

concurrency:
  group: deploy-azure
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      DEPLOYMENT_NAME: nexovital-demo

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az bicep build-params --file infra/parameters/demo.bicepparam --stdout > /dev/null

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group rg-nexovital-demo \
            --template-file infra/main.bicep \
            --parameters infra/parameters/demo.bicepparam \
            --confirm-with-what-if

      - name: Capture outputs
        run: |
          az deployment group show \
            --resource-group rg-nexovital-demo \
            --name "$DEPLOYMENT_NAME" \
            --query 'properties.outputs' \
            -o json > deploy-outputs.json

      - name: Archive outputs
        uses: actions/upload-artifact@v4
        with:
          name: deploy-outputs
          path: deploy-outputs.json
