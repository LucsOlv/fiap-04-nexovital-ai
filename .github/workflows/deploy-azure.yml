name: Deploy Azure

on:
  push:
    branches: [main]
    paths: ["infra/**", "scripts/**", ".github/workflows/deploy-azure.yml"]
  workflow_dispatch:

concurrency:
  group: deploy-azure
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          az bicep build-params --file infra/parameters/demo.bicepparam --stdout > /dev/null

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group rg-nexovital-demo \
            --template-file infra/main.bicep \
            --parameters infra/parameters/demo.bicepparam \
            --confirm-with-what-if

      - name: Capture outputs
        id: outputs
        run: |
          az deployment group show \
            --resource-group rg-nexovital-demo \
            --name main \
            --query 'properties.outputs' \
            -o json > deploy-outputs.json
          echo "outputs=$(cat deploy-outputs.json)" >> $GITHUB_OUTPUT

      - name: Archive outputs
        uses: actions/upload-artifact@v4
        with:
          name: deploy-outputs
          path: deploy-outputs.json
